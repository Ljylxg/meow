<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>帮助中心</title>
    <style>
        .help-section { margin-bottom: 24px; }
        .help-section h3 { color: #333; margin-bottom: 8px; font-size: 18px; }
        .help-section p { color: #666; line-height: 1.6; margin-bottom: 8px; }
        .help-section ul { padding-left: 20px; color: #666; line-height: 1.8; }
    </style>
</head>
<body>
    <h2 style="color:#333;margin-bottom:20px;">帮助中心</h2>

    <div class="help-section">
        <h3>关于本系统</h3>
        <p>用户管理系统是一个基于 Flask 框架构建的 Web 应用，提供用户登录、注册、信息管理等功能。</p>
    </div>

    <div class="help-section">
        <h3>功能介绍</h3>
        <ul>
            <li><strong>登录</strong> —— 使用用户名和密码登录系统</li>
            <li><strong>个人中心</strong> —— 查看和修改个人资料</li>
            <li><strong>上传头像</strong> —— 上传个人头像图片</li>
            <li><strong>充值</strong> —— 为账户余额充值</li>
            <li><strong>搜索</strong> —— 搜索系统内容</li>
        </ul>
    </div>

    <div class="help-section">
        <h3>常见问题</h3>
        <p><strong>Q：忘记密码怎么办？</strong></p>
        <p>A：请联系管理员重置密码。</p>
        <p><strong>Q：如何修改个人信息？</strong></p>
        <p>A：登录后在个人中心页面查看和修改信息。</p>
        <p><strong>Q：充值后余额未更新？</strong></p>
        <p>A：请刷新页面或重新登录查看。</p>
    </div>

    <div class="help-section">
        <h3>联系我们</h3>
        <p>如有其他问题，请联系系统管理员。</p>
    </div>
</body>
</html>
