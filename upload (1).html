{% extends "base.html" %}

{% block content %}
<div class="card upload-card">
    <h2 class="card-title">上传头像</h2>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if success_url %}
        <div class="upload-success">
            <p class="success-text">头像上传成功！</p>
            <div class="preview-container">
                <img src="{{ success_url }}" alt="头像预览" class="avatar-preview">
            </div>
            <p class="file-link-text">
                文件链接：
                <a href="{{ success_url }}" class="file-link" target="_blank">{{ success_url }}</a>
            </p>
            <a href="/upload" class="btn btn-primary">继续上传</a>
        </div>
    {% else %}
        <form method="POST" action="/upload" enctype="multipart/form-data" class="upload-form">
            <div class="form-group">
                <label for="file" class="form-label">选择头像文件</label>
                <input type="file" id="file" name="file" class="form-input-file">
            </div>
            <button type="submit" class="btn btn-primary btn-block">上传头像</button>
        </form>
    {% endif %}
</div>
{% endblock %}
